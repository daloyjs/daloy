title = "Daloy gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Ignore generated coverage and Next.js build output."
paths = [
  '''(?:^|/)dist-coverage(?:/.*)?$''',
  '''(?:^|/)website/\.next(?:/.*)?$''',
]

[[allowlists]]
description = "Allow clearly fake bearer tokens used in docs and workshop curl examples."
targetRules = ["curl-auth-header"]
condition = "AND"
regexTarget = "match"
paths = [
  '''(?:^|/)website/app/docs/tutorials/bookstore/page\.tsx$''',
  '''(?:^|/)website/app/docs/tutorials/multi-user-api/page\.tsx$''',
  '''(?:^|/)workshop/src/challenges/4-hour/(?:coding-steps/exercise-4-steps|instructions/(?:challenge-2-bug|exercise-4))\.md$''',
  '''(?:^|/)workshop/src/challenges/8-hour/(?:coding-steps/exercise-6-steps|instructions/(?:challenge-1-feature|exercise-5|exercise-6))\.md$''',
]
regexes = [
  '''(?i)authorization:[ \t]{0,5}bearer[ \t]{0,5}(?:demo-token|guess|wrong|admin-token|workshop-token|alice-token|\$TOKEN|\$NONE_TOKEN)''',
]

[[allowlists]]
description = "Allow RFC 6455 WebSocket test vectors in WebSocket tests."
targetRules = ["generic-api-key"]
condition = "AND"
regexTarget = "match"
paths = [
  '''(?:^|/)tests/websocket(?:-cswsh)?\.test\.ts$''',
  '''(?:^|/)tests/node-adapter\.test\.ts$''',
]
regexes = [
  '''(?i)(?:sec-websocket-key["': =]+|acceptKey,?\s*)(?:"|')?(?:dGhlIHNhbXBsZSBub25jZQ==|s3pPLMBiTxaQ9kYGzzhZRbK\+xOo=)(?:"|')?''',
]

[[allowlists]]
description = "Allow intentionally fake AWS access key fixtures in security tests."
targetRules = ["aws-access-token"]
condition = "AND"
regexTarget = "match"
paths = [
  '''(?:^|/)tests/(?:verify-no-toxic-skills|logger-redaction-and-header-smuggling)\.test\.ts$''',
]
# The final character is wrapped in a character class so this config file's
# raw text is not itself credential-shaped (the repo's staged-secret scan
# checks every staged file, including this one). Gitleaks compiles the regex
# to the same literal match.
regexes = [
  '''AKIAABCDEFGHIJKLMNO[P]''',
]

[[allowlists]]
description = "Allow intentionally fake Google API key fixtures in security tests."
targetRules = ["gcp-api-key"]
condition = "AND"
regexTarget = "match"
paths = [
  '''(?:^|/)tests/verify-no-toxic-skills\.test\.ts$''',
]
# Character-class split for the same reason as the AWS fixture above.
regexes = [
  '''AIzaSyA0123456789abcdefghijklmnopqrstu[v]''',
]

[[allowlists]]
description = "Allow the intentionally fake webhook signing-secret fixture used in webhook-delivery tests."
targetRules = ["generic-api-key"]
condition = "AND"
regexTarget = "match"
paths = [
  '''(?:^|/)tests/webhook-delivery\.test\.ts$''',
]
regexes = [
  '''whsec_test_0123456789abcdef0123456789abcdef''',
]

[[allowlists]]
description = "Allow the intentionally fake 32-char HMAC/JWT secret fixture (SECRET32) in the red-team attack suite."
targetRules = ["generic-api-key"]
condition = "AND"
regexTarget = "match"
paths = [
  '''(?:^|/)tests/red-team-attacks-2\.test\.ts$''',
]
regexes = [
  '''0123456789abcdef0123456789abcdef''',
]

[[allowlists]]
description = "Allow the intentionally fake webhook signing-secret fixture in the red-team attack suite."
targetRules = ["generic-api-key"]
condition = "AND"
regexTarget = "match"
paths = [
  '''(?:^|/)tests/red-team-attacks\.test\.ts$''',
]
regexes = [
  '''whsec_0123456789abcdef0123456789abcdef''',
]

[[allowlists]]
description = "Allow the RFC 6455 WebSocket handshake test vector (base64 of the literal 16-byte string \"0123456789abcdef\") in the live red-team driver. Covers both the raw base64 match and its base64-decoded form."
targetRules = ["generic-api-key"]
condition = "AND"
regexTarget = "match"
paths = [
  '''(?:^|/)red-team-live/run\.ts$''',
]
regexes = [
  '''MDEyMzQ1Njc4OWFiY2RlZg==''',
  '''0123456789abcdef''',
]

[[allowlists]]
description = "Allow the forged alg:none JWT attack vector (unsigned {\"alg\":\"none\"}.{\"sub\":\"admin\"}) used to prove the auth guard rejects token-confusion attacks in the red-team attack suite."
targetRules = ["jwt"]
condition = "AND"
regexTarget = "match"
paths = [
  '''(?:^|/)tests/red-team-attacks-9\.test\.ts$''',
]
regexes = [
  '''eyJhbGciOiJub25lIn0\.eyJzdWIiOiJhZG1pbiJ9\.''',
]