version: 2

updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(actions)"

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    versioning-strategy: increase-if-necessary
    groups:
      dev-dependencies:
        dependency-type: development
    commit-message:
      prefix: "chore(deps)"