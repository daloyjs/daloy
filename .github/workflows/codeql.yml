name: CodeQL

# Path filters: skip per-PR/push CodeQL when a change only touches the
# marketing/docs site. The weekly schedule still covers the whole repo to
# catch new query rules.
on:
  push:
    branches: [main]
    paths-ignore:
      - "website/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "website/**"
  schedule:
    # Weekly re-scan even when nothing changes — catches new query rules.
    - cron: "37 4 * * 1" # Weekly on Monday at 04:37 UTC

permissions: {}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          show-progress: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@52485aec7be33610227643b0fe83936b8b5f061a # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@52485aec7be33610227643b0fe83936b8b5f061a # v3
        with:
          category: "/language:${{ matrix.language }}"
