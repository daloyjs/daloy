# OpenSSF Scorecard — continuous evaluation of the repo's security posture.
# https://github.com/ossf/scorecard
name: Scorecard

on:
  branch_protection_rule:
  workflow_dispatch:
  schedule:
    - cron: "23 5 * * 2" # Weekly on Tuesday at 05:23 UTC
  push:
    branches: [main]

permissions: {}

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
          show-progress: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # A read-only admin PAT lets Scorecard fully evaluate Branch-Protection
          # (the default GITHUB_TOKEN cannot read all protection settings). Create
          # a fine-grained PAT with Administration: read + Metadata: read and store
          # it as the `SCORECARD_TOKEN` repo secret. Falls back to GITHUB_TOKEN when
          # the secret is absent, so this change is safe to merge before the secret
          # exists (Branch-Protection just stays under-reported until then).
          repo_token: ${{ secrets.SCORECARD_TOKEN || secrets.GITHUB_TOKEN }}
          publish_results: true

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: results.sarif
