# zizmor — static analysis for GitHub Actions workflows.
# https://github.com/woodruffw/zizmor
#
# Catches the exact class of bug behind the TanStack 2026-05-11 incident:
# `pull_request_target` + checkout of fork code, missing permissions blocks,
# unpinned third-party actions, secret leakage via cache, etc.
name: Zizmor

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * *"

permissions: {}

jobs:
  zizmor:
    name: Lint workflows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          show-progress: false

      - name: Run zizmor
        shell: bash
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            ghcr.io/zizmorcore/zizmor:v1.25.0 \
            --format=sarif . > results.sarif

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@52485aec7be33610227643b0fe83936b8b5f061a # v3
        with:
          sarif_file: results.sarif
