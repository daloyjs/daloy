# zizmor — static analysis for GitHub Actions workflows.
# https://github.com/woodruffw/zizmor
#
# Catches the exact class of bug behind the TanStack 2026-05-11 incident:
# `pull_request_target` + checkout of fork code, missing permissions blocks,
# unpinned third-party actions, secret leakage via cache, etc.
name: Zizmor

# Path filters: zizmor only inspects files under `.github/workflows`, so any
# change that does not touch a workflow file cannot change its findings.
# The daily schedule still runs against `main` for drift detection.
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/zizmor.yml"
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/zizmor.yml"
  schedule:
    - cron: "0 7 * * *" # Daily at 07:00 UTC

permissions: {}

jobs:
  zizmor:
    name: Lint workflows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
          show-progress: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          version: v1.25.0
