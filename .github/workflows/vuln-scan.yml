# Continuous technical vulnerability scan — daily SCA against the committed
# lockfile so newly-disclosed CVEs in pinned dependencies are surfaced even
# when no PR or push has run CI.
#
# Why this exists:
#   The standard CI (`ci.yml`) and release (`release.yml`) workflows already
#   run `pnpm audit --prod` on every PR, every push to main, and every
#   release. That catches CVEs at change time but does NOT catch CVEs
#   disclosed AFTER the last change.
#
#   SOC 2 CC7.1 ("the entity uses detection and monitoring procedures to
#   identify ... vulnerabilities") and the Aikido write-up
#   "A Guide to Automating Technical Vulnerability Management for SOC 2"
#   both require a *continuous* cadence: an auditable, scheduled scan that
#   produces evidence on a fixed interval regardless of developer activity.
#
#   This workflow runs `pnpm audit --prod` (production tree, the only tree
#   that ships to consumers of `@daloyjs/core`) and `pnpm audit` (full tree,
#   includes dev dependencies that touch the build / publish path) on a daily
#   schedule. The job fails on prod findings; dev findings are surfaced but
#   non-blocking so they do not page on holidays.
#
# Hardening:
#   * `permissions: {}` at the top level; the single job opts in to
#     `contents: read` only.
#   * Third-party actions are SHA-pinned to match the rest of the repo.
#   * `step-security/harden-runner` is in audit mode (no need to block egress
#     on a read-only scan job that does not touch any secret).
#   * `actions/checkout` runs with `persist-credentials: false`.
#   * `pnpm install --frozen-lockfile --ignore-scripts` plus
#     `npm_config_ignore_scripts=true` so a malicious dev dep cannot run a
#     postinstall during the scan itself.
#   * No GitHub Actions cache, matching `ci.yml` rationale (cache scope is
#     shared between fork PRs and pushes to `main`).

name: Vuln scan

on:
  schedule:
    # 06:13 UTC daily — offset from CodeQL (Mon 04:37), Scorecard (Tue 05:23),
    # and Zizmor (daily 07:00) so the four scheduled security workflows do
    # not all queue at once.
    - cron: "13 6 * * *" # Daily at 06:13 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: vuln-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Daily SCA (pnpm audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit
          disable-sudo: true
          disable-file-monitoring: false

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
          show-progress: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.1.3
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24

      - name: Install dependencies (no scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          npm_config_ignore_scripts: "true"

      - name: Audit production dependencies (blocking)
        # The production tree is what ships to consumers of `@daloyjs/core`.
        # Any advisory here is release-blocking by policy (SECURITY.md
        # "Response Target").
        run: pnpm audit --prod

      - name: Audit full dependency tree (advisory)
        # Includes dev dependencies. Surfaced for triage but non-blocking
        # so a low-severity advisory on a dev-only tool does not page the
        # on-call. Maintainers triage findings via the workflow run log
        # and Dependabot PRs.
        run: pnpm audit
        continue-on-error: true
